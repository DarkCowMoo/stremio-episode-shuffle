name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test
      - name: Smoke test manifest
        run: |
          node server.js &
          sleep 2
          curl -sf http://127.0.0.1:7005/addon/abcdefghijklmnop/manifest.json | grep -q '"id"'
